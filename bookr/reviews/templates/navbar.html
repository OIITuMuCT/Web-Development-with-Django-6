<nav class="navbar navbar-expand-sm navbar-dark sticky-top" style="background-color: #4683b0;">
  <a class="navbar-brand" href="{% url "book_list" %}"
    >{% block brand %}Book Review{% endblock %}</a
  >
  <button
    class="navbar-toggler"
    type="button"
    data-toggle="collapse"
    data-target="#navbarSupportedContent"
    aria-controls="navbarSupportedContent"
    aria-expanded="false"
    aria-label="Toggle navigation"
  >
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarSupportedContent">
    <ul class="navbar-nav mr-auto">
      <li class="nav-item active">
        <a class="nav-link" href="{% url "profile" %}"
          >{% if request.user %}User({{ request.user.username }}){% else %}User(anonymous){% endif %} <span class="sr-only">(current)</span></a
        >
      </li>
      <li class="nav-item">
        <a href="#" class="nav-link">Edit Review</a>
      </li>
        {% if user.is_authenticated %}
          <li class="nav-item">
          <form action="{% url "accounts:logout" %}" method="POST" class="nav-link">
                {% csrf_token %}
                {% comment %} <button type="submit">logged out</button> {% endcomment %}
                <button type="submit" class="btn nav-link">Logged out</button>
            </form>
          </li>
          {% else %}
          <li class="nav-item">
            <a href="{% url "accounts:login" %}" class="nav-link">Login</a>
          </li>
        {% endif %}
    </ul>
    <form class="form-inline my-2 my-lg-0">
      <input
        class="form-control mr-sm-2"
        type="search"
        placeholder="Search"
        aria-label="Search"
      />
      <button class="btn btn-outline-success my-2 my-sm-0" type="submit">
        Search
      </button>
    </form>
  </div>
</nav>
