{% extends "base.html" %}

{% block title %}Form Example{% endblock %}

{% block content %}
<h1>Method: {{ method }} </h1>
{% for message in messages %}
<p><em>{{ message.level_tag|title }}:</em>
{{ message }}</p>
{% endfor %}
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <p>
        <input type="submit" value="Submit">
    </p>
    
</form>



{% endblock %}
