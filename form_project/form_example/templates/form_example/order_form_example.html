{% extends "base.html" %}

{% block title %}Order Form with Validate{% endblock %}
{% block content %}
    <h4>Method: {{ method }}</h4>
    <form action="" method="POST">
    {% csrf_token %}
    {{form.as_p}}
    <p><input type="submit" name="submit_input" value="Submit Input" /></p>
    <p>
      <button type="submit" name="button_element" value="Button Element">
        Button With <strong>Styled</strong> Text
      </button>
    </p>
    <input type="hidden" name="hidden_input" value="Hidden Value" />
    </form>

{% endblock %}
