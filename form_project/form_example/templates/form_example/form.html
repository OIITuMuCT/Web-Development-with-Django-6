{% extends "base.html" %} 

{% block title %}Form example class{% endblock %} 

{%block content %}
<form action="" method="post">
  {% csrf_token %}
  <p>
    <!--text input form-->
    <label for="id_text_input">Text input:</label>
    <input
      type="text"
      name="text_input"
      required
      id="id_text_input"
      placeholder="Input your text"
    />
  </p>
      <!--password input form-->
  <p>
    <label for="id_password_input">Password input:</label>
    <input
      type="password"
      name="password_input"
      required
      id="id_password_input"
    />
  </p>
      <!--checkbox on input form-->
  <p>
    <label for="id_checkbox">Checkbox on:</label>
    <input type="checkbox" name="checkbox_on" required id="id_checkbox_on" />
  </p>
    <!--choice form-->
  <p><label for="id_favorite_book">Favorite book:</label>
  <select name="favorite_book" id="id_favorite_book">
    <option value="1">Deep Learning with Keras</option>
    <option value="2">Web Development with Django</option>
    <option value="3">Brave New World</option>
    <option value="4">The Great Gatsby</option>
  </select></p>
<!-- multiple choices form -->
<p>
<label for="id_books_you_own">Books you own:</label>
  <select name="books_you_own" required id="id_books_you_own" multiple>
    <optgroup label="Non-Fiction">
      <option value="1">Deep Learning with Keras</option>
      <option value="2">Web Development with Django</option>
    </optgroup>
    <optgroup label="Fiction">
      <option value="3">Brave New World</option>
      <option value="4">The Great Gatsby</option>
    </optgroup>
    </select>
</p>
<!-- ration input choices form-->
<label for="id_radio_input_0">Radio input:</label>
<ul id="id_radio_input">
<li>
<label for="id_radio_input_0">
<input type="radio" name="radio_input"
value="Value One" required
id="id_radio_input_0">
Value One
</label>
</li>
<li>
<label for="id_radio_input_1">
<input type="radio" name="radio_input"
value="Value Two" required
id="id_radio_input_1">
Value Two
</label>
</li>
<li>
<label for="id_radio_input_2">
<input type="radio" name="radio_input"
value="Value Three" required
id="id_radio_input_2">
Value Three
</label>
</li>
</ul>
<!--text area form-->
<p>
    <label for="id_text_area">Text area:</label>
<textarea name="text_area" cols="40" rows="5" required id="id_text_area"></textarea>
</p>
<p><input type="submit" name="submit_input" value="Submit Input" /></p>
<!--integer input form-->
<p>
    <label for="id_integer_input">Integer input:</label>
    <input type="number" name="integer_input" id="id_integer_input" required >
</p>
<!--float input form-->
<p>
    <label for="id_float_input">Float input:</label>
    <input type="number" name="float_input" required step="any" id="id_float_input">
</p>
<!--decimal input form-->
<p>
    <label for="id_decimal_input">Decimal input:</label>
    <input type="number" name="decimal_input" required step="any" id="id_decimal_input">
</p>
    <!--email input form-->
    <p>
    <label for="id_email_input">Email input:</label>
    <input type="email" name="email_input" required id="id_email_input">
    </p>

    <!--date input form-->
    <p>
    <label for="id_date_input">Date input:</label>
    <input type="date" name="date_input" required
    id="id_date_input">
    </p>
    
</form>

{% endblock %}
